version: '3.8'

services:
  backend:
    build: ./backend
    restart: always
    volumes:
      - ./backend/models:/app/models
      - ./backend/uploads:/app/uploads
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=production
      # - REDIS_URL=redis://redis:6379/0 # for later if needed

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      # - "443:443" # For SSL later
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
