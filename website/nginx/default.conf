server {
    listen 80;
    # Replace with your actual domain or VPS IP later
    server_name localhost; 

    # Allow large CSV uploads (up to 50MB)
    client_max_body_size 50M;

    # Gzip compression for faster API responses
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1000;

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Prevent timeout for slightly longer requests (handled largely by background tasks though)
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }
}
